name: CI
on:
  push:
    branches: [ main ]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tahrir
          POSTGRES_PASSWORD: tahrir
          POSTGRES_DB: tahrir_go
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USER: tahrir
      DB_PASSWORD: tahrir
      DB_NAME: tahrir_go

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install goose
        run: go install github.com/pressly/goose/v3/cmd/goose@latest

      - name: Run migrations
        run: goose -dir internal/db/migrations postgres "host=localhost port=5432 user=tahrir password=tahrir dbname=tahrir_go sslmode=disable" up

      - name: Run tests
        run: go test ./...

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
            version: v2.11.3

      - name: Build project
        run: go build ./...
